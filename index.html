<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест клавиатуры — современный дизайн</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --color-bg: #f7f9fc;
    --color-fg: #2b2b2b;
    --color-card-bg: #ffffff;
    --color-card-shadow: rgba(0,0,0,.08);
    --color-key: #0066ff;
    --color-mod-bg: #e6f2ff;
    --color-mod-fg: #0066ff;
    --color-accent: #0066ff;
    --transition: 0.25s ease;
}
.dark {
    --color-bg: #1e1e2f;
    --color-fg: #e0e0e8;
    --color-card-bg: #282a36;
    --color-card-shadow: rgba(0,0,0,.4);
    --color-key: #ff79c6;
    --color-mod-bg: #44475a;
    --color-mod-fg: #ff79c6;
    --color-accent: #ff79c6;
}
html,body{
    height:100%;margin:0;font-family:'Inter',sans-serif;
    background:var(--color-bg);color:var(--color-fg);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
}
#card{
    background:var(--color-card-bg);border-radius:12px;
    padding:2rem 2.5rem;box-shadow:0 8px 24px var(--color-card-shadow);
    text-align:center;max-width:380px;width:90%;position:relative;
    transition:background var(--transition),box-shadow var(--transition);
}
#theme-toggle{
    position:absolute;top:.8rem;right:.8rem;background:none;border:none;
    cursor:pointer;font-size:1.2rem;color:var(--color-fg);
    transition:color var(--transition);
}
#theme-toggle:hover{color:var(--color-accent);}
h1{margin:0 0 .8rem;font-weight:600;font-size:1.6rem;color:var(--color-fg);}
.key{font-size:3rem;font-weight:700;color:var(--color-key);margin:.6rem 0;
    animation:pulse .8s var(--transition) infinite alternate;}
.code,.mods{font-size:.95rem;line-height:1.4;color:var(--color-fg);}
.mods span{
    display:inline-block;background:var(--color-mod-bg);color:var(--color-mod-fg);
    border-radius:4px;padding:2px 8px;margin:2px 4px 0 0;font-size:.85rem;
    transition:background var(--transition),color var(--transition);
}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.07);}}
#hint{margin-top:1.4rem;font-size:.85rem;color:var(--color-fg);opacity:.7;}
@media (max-width:420px){
    .key{font-size:2.4rem;}
    #card{padding:1.5rem 1.8rem;}
}
</style>
</head>

<body>
<div id="card">
    <button id="theme-toggle" aria-label="Переключить тему">🌙</button>

    <h1>Тест клавиатуры</h1>

    <div class="key">Нажмите любую клавишу</div>
    <div class="code"></div>
    <div class="mods"></div>

    <div id="hint">Пробел, Enter, стрелки… проверяйте любые клавиши!</div>
</div>

<script>
/* ---------- Тема ---------- */
const toggleBtn = document.getElementById('theme-toggle');
toggleBtn.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    toggleBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
});

/* ---------- Вывод информации о клавише ---------- */
const keyDiv   = document.querySelector('.key');
const codeDiv  = document.querySelector('.code');
const modsDiv  = document.querySelector('.mods');

function updateInfo(e) {
    const name = (e.key.length === 1) ? e.key.toUpperCase() : e.key;
    keyDiv.textContent = `Клавиша: ${name}`;
    codeDiv.textContent = `Код: ${e.code}`;

    const mods = [];
    if (e.shiftKey) mods.push('Shift');
    if (e.ctrlKey)  mods.push('Ctrl');
    if (e.altKey)   mods.push('Alt');
    if (e.metaKey)  mods.push('Meta');

    if (mods.length) {
        modsDiv.innerHTML = `<strong>Модификаторы:</strong> ` +
            mods.map(m => `<span>${m}</span>`).join('');
    } else {
        modsDiv.innerHTML = `<strong>Модификаторы:</strong> нет`;
    }
}

/* ---------- Звук при нажатии ---------- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClick() {
    // Создаём короткий «щелчок» – синусоидальный осциллятор 440 Гц, 50 мс
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'square';          // более «твердый» звук, чем sine
    osc.frequency.value = 440;   // нота A4

    // Параметры огибающей: быстро поднимаем громкость, потом быстро спадаем
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.005); // атака
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); // спуск

    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.06); // чуть дольше, чем длительность огибающей
}

/* ---------- Обработчик клавиатуры ---------- */
window.addEventListener('keydown', e => {
    e.preventDefault();          // отключаем скролл и прочие действия
    updateInfo(e);
    playClick();                 // звук сразу после обновления UI
});
</script>
</body>
</html>
