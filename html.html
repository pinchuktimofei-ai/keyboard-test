<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест клавиатуры — современный дизайн</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* -------------------------------------------------
   Переменные – позволяют легко менять цвета
   ------------------------------------------------- */
:root {
    --color-bg: #f7f9fc;
    --color-fg: #2b2b2b;
    --color-card-bg: #ffffff;
    --color-card-shadow: rgba(0,0,0,.08);
    --color-key: #0066ff;
    --color-mod-bg: #e6f2ff;
    --color-mod-fg: #0066ff;
    --color-accent: #0066ff;
    --transition: 0.25s ease;
}

/* Тёмная тема – включается класс .dark */
.dark {
    --color-bg: #1e1e2f;
    --color-fg: #e0e0e8;
    --color-card-bg: #282a36;
    --color-card-shadow: rgba(0,0,0,.4);
    --color-key: #ff79c6;
    --color-mod-bg: #44475a;
    --color-mod-fg: #ff79c6;
    --color-accent: #ff79c6;
}

/* -------------------------------------------------
   Общие стили страницы
   ------------------------------------------------- */
html, body {
    height: 100%;
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--color-bg);
    color: var(--color-fg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* -------------------------------------------------
   Карточка‑контейнер
   ------------------------------------------------- */
#card {
    background: var(--color-card-bg);
    border-radius: 12px;
    padding: 2rem 2.5rem;
    box-shadow: 0 8px 24px var(--color-card-shadow);
    text-align: center;
    max-width: 380px;
    width: 90%;
    position: relative;
    transition: background var(--transition), box-shadow var(--transition);
}

/* -------------------------------------------------
   Тема‑переключатель
   ------------------------------------------------- */
#theme-toggle {
    position: absolute;
    top: 0.8rem;
    right: 0.8rem;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    color: var(--color-fg);
    transition: color var(--transition);
}
#theme-toggle:hover { color: var(--color-accent); }

/* -------------------------------------------------
   Текст внутри карточки
   ------------------------------------------------- */
h1 {
    margin: 0 0 0.8rem;
    font-weight: 600;
    font-size: 1.6rem;
    color: var(--color-fg);
}
.key {
    font-size: 3rem;
    font-weight: 700;
    color: var(--color-key);
    margin: 0.6rem 0;
    animation: pulse 0.8s var(--transition) infinite alternate;
}
.code, .mods {
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--color-fg);
}
.mods span {
    display: inline-block;
    background: var(--color-mod-bg);
    color: var(--color-mod-fg);
    border-radius: 4px;
    padding: 2px 8px;
    margin: 2px 4px 0 0;
    font-size: 0.85rem;
    transition: background var(--transition), color var(--transition);
}

/* -------------------------------------------------
   Анимация «пульс» для большой клавиши
   ------------------------------------------------- */
@keyframes pulse {
    from { transform: scale(1); }
    to   { transform: scale(1.07); }
}

/* -------------------------------------------------
   Подсказка внизу
   ------------------------------------------------- */
#hint {
    margin-top: 1.4rem;
    font-size: 0.85rem;
    color: var(--color-fg);
    opacity: 0.7;
}

/* -------------------------------------------------
   Адаптивность
   ------------------------------------------------- */
@media (max-width: 420px) {
    .key { font-size: 2.4rem; }
    #card { padding: 1.5rem 1.8rem; }
}
</style>
</head>

<body>
<div id="card">
    <button id="theme-toggle" aria-label="Переключить тему">🌙</button>

    <h1>Тест клавиатуры</h1>

    <div class="key">Нажмите любую клавишу</div>
    <div class="code"></div>
    <div class="mods"></div>

    <div id="hint">Пробел, Enter, стрелки… проверяйте любые клавиши!</div>
</div>

<script>
/* -------------------------------------------------
   Переключатель темы
   ------------------------------------------------- */
const toggleBtn = document.getElementById('theme-toggle');
toggleBtn.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    // Меняем иконку в зависимости от темы
    toggleBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
});

/* -------------------------------------------------
   Вывод информации о нажатой клавише
   ------------------------------------------------- */
const keyDiv   = document.querySelector('.key');
const codeDiv  = document.querySelector('.code');
const modsDiv  = document.querySelector('.mods');

function updateInfo(e) {
    // 1️⃣ Текст клавиши (символ → верхний регистр)
    const name = (e.key.length === 1) ? e.key.toUpperCase() : e.key;
    keyDiv.textContent = `Клавиша: ${name}`;

    // 2️⃣ Технический код
    codeDiv.textContent = `Код: ${e.code}`;

    // 3️⃣ Модификаторы
    const mods = [];
    if (e.shiftKey) mods.push('Shift');
    if (e.ctrlKey)  mods.push('Ctrl');
    if (e.altKey)   mods.push('Alt');
    if (e.metaKey)  mods.push('Meta');

    if (mods.length) {
        modsDiv.innerHTML = `<strong>Модификаторы:</strong> ` +
            mods.map(m => `<span>${m}</span>`).join('');
    } else {
        modsDiv.innerHTML = `<strong>Модификаторы:</strong> нет`;
    }
}

/* -------------------------------------------------
   Слушаем keydown – отменяем стандартные действия
   (прокрутка пробелом, ввод в форму и т.п.)
   ------------------------------------------------- */
window.addEventListener('keydown', e => {
    e.preventDefault();   // важно для чистого теста
    updateInfo(e);
});
</script>
</body>
</html>
